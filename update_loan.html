<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Loan — VaultManager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
        .card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:2.5rem;width:100%;max-width:520px}
        .back-link{display:inline-flex;align-items:center;gap:.4rem;color:#64748b;font-size:.8rem;text-decoration:none;margin-bottom:1.25rem}
        .back-link:hover{color:#94a3b8}
        .card-header{margin-bottom:2rem}
        .card-header h2{font-size:1.35rem;font-weight:700;color:#f1f5f9}
        .card-header p{color:#64748b;font-size:.875rem;margin-top:.25rem}
        .form-group{margin-bottom:1.25rem}
        label{display:block;color:#94a3b8;font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.5rem}
        select{width:100%;padding:.75rem 1rem;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#f1f5f9;font-size:.9rem;font-family:inherit;outline:none;transition:all .2s;-webkit-appearance:none}
        select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.2)}
        select option{background:#1e293b}
        .select-wrapper{position:relative}
        .select-wrapper::after{content:'▾';position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:#475569;pointer-events:none}
        .btn{padding:.8rem 1.5rem;border:none;border-radius:10px;font-size:.9rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem}
        .btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.35)}
        .btn-primary:hover{transform:translateY(-1px)}
        .btn-secondary{background:#0f172a;color:#94a3b8;border:1px solid #334155}
        .btn-secondary:hover{color:#f1f5f9;border-color:#475569}
        .btn-row{display:flex;gap:.75rem;margin-top:1.5rem;flex-wrap:wrap}
        .alert{padding:.875rem 1.25rem;border-radius:10px;font-size:.875rem;margin-bottom:1.5rem;border-left:4px solid}
        .alert-success{background:rgba(5,150,105,.1);border-color:#059669;color:#34d399}
        .alert-danger{background:rgba(220,38,38,.1);border-color:#dc2626;color:#f87171}
        .alert-info{background:rgba(37,99,235,.1);border-color:#2563eb;color:#93c5fd}
    </style>
</head>
<body>
    <div class="card">
        <a href="{{ url_for('manager_dashboard') }}" class="back-link">← Back to Dashboard</a>
        <div class="card-header">
            <h2>Update Loan Status</h2>
            <p>Select a loan and change its current status.</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Select Loan</label>
                <div class="select-wrapper">
                    <select name="loan_id" required>
                        <option value="" disabled selected>— Choose a loan —</option>
                        {% for loan in loans %}
                        <option value="{{ loan[0] }}">
                            Loan #{{ loan[0] }} — {{ loan[1] }} — ${{ loan[2]|float|round(2) }} [{{ loan[3] }}]
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>New Status</label>
                <div class="select-wrapper">
                    <select name="new_status" required>
                        <option value="Pending">Pending</option>
                        <option value="Approved">Approved</option>
                        <option value="Completed">Completed</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn btn-primary">Update Status →</button>
                <a href="{{ url_for('manager_dashboard') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
